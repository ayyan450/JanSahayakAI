<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jan Sahayak AI</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Segoe UI,Arial,sans-serif;
    background:#0f172a;
    color:white;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:95%;
    max-width:850px;
    height:85vh;
    background:#111827;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 0 30px rgba(0,0,0,.4);
}

.header{
    padding:20px;
    text-align:center;
    background:#1e293b;
    border-bottom:1px solid #334155;
}

.header h1{
    font-size:28px;
}

.header p{
    color:#94a3b8;
    margin-top:5px;
}

.chat{
    height:65vh;
    overflow-y:auto;
    padding:20px;
}

.bot{
    background:#1e293b;
    padding:12px;
    border-radius:12px;
    margin-bottom:12px;
}

.user{
    background:#2563eb;
    padding:12px;
    border-radius:12px;
    margin-bottom:12px;
    text-align:right;
}

.input-area{
    display:flex;
    gap:10px;
    padding:15px;
    border-top:1px solid #334155;
}

input{
    flex:1;
    padding:14px;
    border:none;
    border-radius:12px;
    background:#1e293b;
    color:white;
    font-size:16px;
}

button{
    padding:14px 22px;
    border:none;
    border-radius:12px;
    background:#2563eb;
    color:white;
    cursor:pointer;
    font-size:16px;
}
</style>
</head>

<body>

<div class="container">

    <div class="header">
        <h1>🤖 Jan Sahayak AI</h1>
        <p>Government Help Assistant</p>
    </div>

    <div class="chat" id="chat">
        <div class="bot">
            Namaste! Main Jan Sahayak AI hoon. Aap Passport, Aadhaar, PAN ya Train Ticket ke baare mein pooch sakte hain.
        </div>
    </div>

    <div class="input-area">
        <input type="text" id="question" placeholder="Apna sawal likhiye...">
        <button onclick="reply()">Send</button>
    </div>

</div>

<script>
function reply(){

let q=document.getElementById("question").value;
if(q.trim()=="") return;

let chat=document.getElementById("chat");

chat.innerHTML += `<div class="user">${q}</div>`;

let text=q.toLowerCase();
let ans="";

if(text.includes("passport")){
ans="Passport ke liye Passport Seva Portal par apply karein.";
}
else if(text.includes("train") || text.includes("ticket")){
ans="Train ticket IRCTC ke madhyam se book kiya jata hai.";
}
else if(text.includes("aadhar") || text.includes("aadhaar")){
ans="Aadhaar se judi seva ke liye UIDAI portal dekhein.";
}
else if(text.includes("pan")){
ans="PAN card NSDL ya UTIITSL ke madhyam se ban sakta hai.";
}
else{
ans="Mujhe abhi iska jawab nahi pata.";
}

chat.innerHTML += `<div class="bot">${ans}</div>`;

document.getElementById("question").value="";
chat.scrollTop=chat.scrollHeight;
}
</script>

</body>
</html>
